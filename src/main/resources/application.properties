spring.application.name=recommendation-service

spring.neo4j.uri=${NEO4J_URI}
spring.neo4j.authentication.username=${NEO4J_USERNAME}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}

spring.data.neo4j.database=${NEO4J_DATABASE}

# Connection pool — keeps AuraDB connections alive and discards stale ones
spring.neo4j.pool.max-connection-lifetime=1h
spring.neo4j.pool.connection-liveness-check-timeout=60s
spring.neo4j.pool.max-connection-pool-size=10
spring.neo4j.connection-timeout=30s

jwt.secret=${JWT_SECRET}

server.port=${SERVER_PORT}

spring.config.import=optional:classpath:application-secrets.properties